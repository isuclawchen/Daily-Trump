baseURL: /
languageCode: zh-Hant
title: Daily Public Report
defaultContentLanguage: zh-hant
timeZone: Asia/Taipei
enableGitInfo: true

disableKinds:
  - taxonomy
  - term

frontmatter:
  date:
    - :filename
    - date
    - publishDate
    - lastmod
  publishDate:
    - publishDate
    - :filename
    - date
  lastmod:
    - lastmod
    - :git
    - :fileModTime

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  description: 以人物為主軸的追蹤站，聚焦最新報告與歷史時間線。
  marketTicker:
    locale: zh_TW
    symbols:
      - label: BTC
        tradingview: BITSTAMP:BTCUSD
      - label: S&P500
        tradingview: FOREXCOM:SPXUSD
      - label: NASDAQ
        tradingview: FOREXCOM:NSXUSD
      - label: DXY
        tradingview: INDEX:DXY
      - label: Gold
        tradingview: OANDA:XAUUSD
      - label: BRENT
        tradingview: TVC:UKOIL
      - label: USD/TWD
        tradingview: FX_IDC:USDTWD

caches:
  images:
    dir: :cacheDir/images
